<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Kanban Board</h1>
    </header>

    <div class="board">
        <div class="column" id="todo">
            <h2>To Do</h2>
            <div class="card-list" ondragover="allowDrop(event)" ondrop="drop(event, 'todo')"></div>
            <button class="add-btn" onclick="addCardPrompt('todo')">+ Add Card</button>
        </div>

        <div class="column" id="inprogress">
            <h2>In Progress</h2>
            <div class="card-list" ondragover="allowDrop(event)" ondrop="drop(event, 'inprogress')"></div>
            <button class="add-btn" onclick="addCardPrompt('inprogress')">+ Add Card</button>
        </div>

        <div class="column" id="done">
            <h2>Done</h2>
            <div class="card-list" ondragover="allowDrop(event)" ondrop="drop(event, 'done')"></div>
            <button class="add-btn" onclick="addCardPrompt('done')">+ Add Card</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
